<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Car Ears</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="home-page">

  <!-- Scrim behind sticker panel -->
  <div id="sticker-scrim" class="sticker-scrim" hidden></div>

  <!-- Sticker panel -->
  <div id="sticker-panel" class="sticker-panel" hidden>
    <div class="sticker-panel-header">
      <span class="sticker-panel-title">Add a sticker</span>
      <button class="sticker-panel-close" id="sticker-panel-close" aria-label="Close">&#215;</button>
    </div>

    <span class="sticker-section-label">Library</span>
    <div class="sticker-grid" id="sticker-library"></div>

    <div class="sticker-divider"></div>

    <span class="sticker-section-label">Your stickers</span>
    <label class="sticker-upload-btn">
      + Upload image
      <input type="file" id="sticker-upload-input" accept="image/*" style="display:none">
    </label>
    <div class="sticker-grid" id="custom-sticker-grid"></div>
  </div>

  <main class="home-container">
    <header class="home-header">
      <h1 class="site-title">Car Ears</h1>
      <p class="site-subtitle">internship &amp; career planning</p>
    </header>

    <div class="books-shelf">
      <a href="notepad-1.html" class="book" id="book-1">
        <div class="book-spine" id="spine-1"></div>
        <div class="book-cover" id="cover-1">
          <span
            class="book-label"
            id="label-1"
          >Notebook One</span>
          <span class="book-deco">&#x2014; &#x2726; &#x2014;</span>
          <div class="sticker-layer" id="sticker-layer-1"></div>
          <button class="sticker-add-btn" id="add-sticker-1" title="Add sticker">&#x2726;</button>
        </div>
      </a>

      <a href="notepad-2.html" class="book" id="book-2">
        <div class="book-spine" id="spine-2"></div>
        <div class="book-cover" id="cover-2">
          <span
            class="book-label"
            id="label-2"
          >Notebook Two</span>
          <span class="book-deco">&#x2014; &#x2726; &#x2014;</span>
          <div class="sticker-layer" id="sticker-layer-2"></div>
          <button class="sticker-add-btn" id="add-sticker-2" title="Add sticker">&#x2726;</button>
        </div>
      </a>
    </div>

    <a href="whiteboard.html" class="wb-home-link">&#x2726; whiteboard</a>

    <p class="home-footer">chase &amp; valeria</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
